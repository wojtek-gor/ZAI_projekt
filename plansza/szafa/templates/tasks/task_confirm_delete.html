
{% block content %}

<h2 class="btn btn-secondary btn-sm" style="width: 100ch;" xmlns="http://www.w3.org/1999/html">Usuń zadanie '{{ task.title }}'</h2>

<p>Czy na pewno usunąć "{{ object }}"?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-outline-primary btn-sm" style="width: 20ch;" type="submit">Tak, usuń</button>
    <a href="{% url 'task_list' %}" class="btn btn-outline-primary btn-sm" style="width: 20ch";>Anuluj</a>
</form>



{% endblock %}
