<!DOCTYPE html>
<html>
<head>
    <title>Lista zadań</title>
</head>
<body>
<h1>Lista zadań</h1>
{% if tasks %}
<ul>
    {% for task in tasks %}
    <li>
        <a href="{% url 'task_detail' task.pk %}">
            {{ task.title }}
        </a>
        | status: {{ task.status }}
        | projekt: {{ task.project }}
        | termin: {{ task.due_date }}
    </li>
    <p>
    <a href="{% url 'task_delete' pk=task.id %}">Usuń</a>
</p>
    {% endfor %}
</ul>
{% else %}
<p>Brak zadań.</p>
{% endif %}
<p>
    <a href="{% url 'task_add'%}">Nowe zadanie</a>
</p>
</body>
</html>
