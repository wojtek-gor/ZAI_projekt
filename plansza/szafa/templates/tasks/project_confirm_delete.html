{% extends "base.html" %}

{% block content %}

<h2 class="btn btn-secondary btn-sm" style="width: 100ch;">Usuń projekt '{{ object.name }}'</h2>

<p>Czy na pewno usunąć projekt "{{ object }}"?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-outline-primary btn-sm" style="width: 20ch;" type="submit">Tak, usuń</button>
    <a href="{% url 'project_list' %}" class="btn btn-outline-primary btn-sm" style="width: 20ch;">Anuluj</a>
</form>


{% endblock %}
