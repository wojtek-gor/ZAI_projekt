{% extends "base.html" %}

{% block content %}

<h2>Lista projektów</h2>

<p>
    <a href="{% url 'project_add' %}" class="btn btn-outline-primary btn-sm">Dodaj projekt</a>
</p>

{% if projects %}
    <ul>
        {% for project in projects %}
            <li>
                <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary btn-sm" style="width: 100ch;">
                    {{ project.name }}
                </a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Brak projektów.</p>
{% endif %}

{% endblock %}
